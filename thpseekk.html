<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitPrime — Professional Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141417;
            --surface-hover: #1c1c21;
            --border: #26262e;
            --accent: #c8f55a; /* Lime */
            --accent-soft: rgba(200, 245, 90, 0.1);
            --text-main: #f8f8f2;
            --text-muted: #8e8e9a;
            --danger: #ff5555;
            --success: #50fa7b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }

        /* Glassmorphism Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; }
        .brand span { color: var(--accent); }

        /* Stats Dashboard */
        .stats-grid {
            display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 24px;
            transition: var(--transition);
        }

        .card:hover { border-color: var(--muted); }

        .progress-circle-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Habit List */
        .habit-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px 20px; border-radius: 14px;
            margin-bottom: 12px; cursor: pointer; transition: var(--transition);
        }

        .habit-item:hover { transform: translateX(5px); background: var(--surface-hover); }
        .habit-item.completed { border-color: var(--accent-soft); opacity: 0.8; }
        .habit-item.completed .check-box { background: var(--accent); border-color: var(--accent); }

        .check-box {
            width: 24px; height: 24px; border: 2px solid var(--border);
            border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }

        .tag {
            font-family: 'DM Mono', monospace; font-size: 0.7rem;
            padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
        }

        /* Input Section */
        .input-group {
            display: grid; grid-template-columns: 1fr auto auto; gap: 10px;
            margin-top: 25px; background: var(--surface); padding: 10px; border-radius: 15px;
        }

        input, select {
            background: transparent; border: none; color: white; padding: 10px; outline: none;
        }

        .btn-add {
            background: var(--accent); color: var(--bg); font-weight: bold;
            padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
        }

        /* Toast & Animations */
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 15px 25px;
            border-radius: 10px; background: var(--surface); border: 1px solid var(--accent);
            animation: slideIn 0.3s ease; z-index: 1000; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>Habit<span>Prime</span></h1>
            <p id="current-date" style="color: var(--text-muted); font-size: 0.8rem;"></p>
        </div>
        <div id="sync-status" class="tag" style="background: var(--surface); color: var(--text-muted);">Disconnected</div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <canvas id="mainChart"></canvas>
        </div>
        <div class="card progress-circle-container">
            <div style="position: relative; width: 100px; height: 100px;">
                <canvas id="ringChart" width="100" height="100"></canvas>
                <div id="ringLabel" style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight: bold;">0%</div>
            </div>
            <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-muted);">Goal Mastery</p>
        </div>
    </div>

    <div id="habit-container">
        </div>

    <div class="input-group card">
        <input type="text" id="habit-name" placeholder="Focus baru hari ini?">
        <select id="habit-tag">
            <option value="Health">Health</option>
            <option value="Focus">Focus</option>
            <option value="Spirit">Spirit</option>
        </select>
        <button class="btn-add" onclick="core.addHabit()">Add</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    /*
      CORE ENGINE - Encapsulated for Stability & Scalability
    */
    const core = {
        state: {
            habits: [],
            logs: {},
            config: JSON.parse(localStorage.getItem('prime_cfg')) || {}
        },

        init() {
            this.loadLocal();
            this.render();
            this.updateClock();
            if(this.state.config.token) this.syncFromCloud();
        },

        updateClock() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
        },

        render() {
            const container = document.getElementById('habit-container');
            const today = new Date().toISOString().split('T')[0];
            const todayLogs = this.state.logs[today] || [];

            container.innerHTML = this.state.habits.map(h => `
                <div class="habit-item ${todayLogs.includes(h.id) ? 'completed' : ''}" onclick="core.toggleHabit('${h.id}')">
                    <div style="display: flex; align-items: center;">
                        <div class="check-box">
                            ${todayLogs.includes(h.id) ? '✓' : ''}
                        </div>
                        <div>
                            <div style="font-weight: 500;">${h.name}</div>
                            <div style="font-size: 0.7rem; color: var(--text-muted);">${h.tag}</div>
                        </div>
                    </div>
                    <div class="tag" style="background: var(--accent-soft); color: var(--accent); font-size: 0.6rem;">
                        ${this.calculateStreak(h.id)} Day Streak
                    </div>
                </div>
            `).join('');

            this.updateCharts();
        },

        addHabit() {
            const nameEl = document.getElementById('habit-name');
            const tagEl = document.getElementById('habit-tag');
            if(!nameEl.value) return;

            const newHabit = {
                id: 'h-' + Date.now(),
                name: nameEl.value,
                tag: tagEl.value,
                created: new Date().toISOString()
            };

            this.state.habits.push(newHabit);
            nameEl.value = '';
            this.save();
        },

        toggleHabit(id) {
            const today = new Date().toISOString().split('T')[0];
            if(!this.state.logs[today]) this.state.logs[today] = [];
            
            const index = this.state.logs[today].indexOf(id);
            if(index > -1) this.state.logs[today].splice(index, 1);
            else this.state.logs[today].push(id);
            
            this.save();
        },

        calculateStreak(id) {
            let streak = 0;
            let d = new Date();
            while(true) {
                const key = d.toISOString().split('T')[0];
                if(this.state.logs[key] && this.state.logs[key].includes(id)) {
                    streak++;
                    d.setDate(d.getDate() - 1);
                } else {
                    break;
                }
            }
            return streak;
        },

        save() {
            localStorage.setItem('prime_data', JSON.stringify({
                habits: this.state.habits,
                logs: this.state.logs
            }));
            this.render();
            this.notify("State Updated");
            // Auto-sync logic here if token exists
        },

        loadLocal() {
            const data = JSON.parse(localStorage.getItem('prime_data'));
            if(data) {
                this.state.habits = data.habits || [];
                this.state.logs = data.logs || {};
            }
        },

        notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        },

        updateCharts() {
            // Re-use logic from your Canvas draw, but with better styling
            this.drawRing();
        },

        drawRing() {
            const canvas = document.getElementById('ringChart');
            const ctx = canvas.getContext('2d');
            const today = new Date().toISOString().split('T')[0];
            const done = (this.state.logs[today] || []).length;
            const total = this.state.habits.length;
            const pct = total === 0 ? 0 : Math.round((done/total) * 100);

            document.getElementById('ringLabel').innerText = pct + '%';
            
            ctx.clearRect(0, 0, 100, 100);
            // Track
            ctx.beginPath();
            ctx.arc(50, 50, 45, 0, Math.PI * 2);
            ctx.strokeStyle = '#26262e';
            ctx.lineWidth = 8;
            ctx.stroke();
            // Progress
            ctx.beginPath();
            ctx.arc(50, 50, 45, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * (pct/100)));
            ctx.strokeStyle = '#c8f55a';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
    };

    core.init();
</script>
</body>
</html>
