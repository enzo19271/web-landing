<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-10">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <a href="index.html" class="text-blue-600 font-medium flex items-center gap-2">
                ← <span class="hover:underline">Kembali</span>
            </a>
            <button onclick="exportData()" class="bg-black text-white px-4 py-2 rounded-lg text-sm font-semibold">Export Data</button>
        </div>

        <h1 class="text-3xl font-bold mb-2">Habit Builder 🚀</h1>
        <p class="text-gray-500 mb-8">Disiplin adalah kunci kesuksesan.</p>

        <!-- Progress Card -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8 text-center">
            <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Progres Hari Ini</h4>
            <div class="text-5xl font-black text-blue-600 mb-4" id="percentage">0%</div>
            <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- Habits List -->
        <div id="habitList" class="space-y-4">
            <!-- Item 1 -->
            <div class="flex items-center justify-between p-5 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <div class="flex items-center gap-4">
                    <input type="checkbox" onchange="updateProgress()" class="habit-check w-6 h-6 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    <span class="font-semibold text-gray-700">Bangun Jam 5 Pagi</span>
                </div>
                <span class="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">Health</span>
            </div>

            <!-- Item 2 -->
            <div class="flex items-center justify-between p-5 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <div class="flex items-center gap-4">
                    <input type="checkbox" onchange="updateProgress()" class="habit-check w-6 h-6 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    <span class="font-semibold text-gray-700">Belajar Coding 1 Jam</span>
                </div>
                <span class="text-xs bg-purple-50 text-purple-600 px-3 py-1 rounded-full font-bold">Skill</span>
            </div>

            <!-- Item 3 -->
            <div class="flex items-center justify-between p-5 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <div class="flex items-center gap-4">
                    <input type="checkbox" onchange="updateProgress()" class="habit-check w-6 h-6 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    <span class="font-semibold text-gray-700">Olahraga Ringan</span>
                </div>
                <span class="text-xs bg-green-50 text-green-600 px-3 py-1 rounded-full font-bold">Health</span>
            </div>

            <!-- Item 4 -->
            <div class="flex items-center justify-between p-5 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <div class="flex items-center gap-4">
                    <input type="checkbox" onchange="updateProgress()" class="habit-check w-6 h-6 rounded-lg border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    <span class="font-semibold text-gray-700">Membaca Buku</span>
                </div>
                <span class="text-xs bg-yellow-50 text-yellow-600 px-3 py-1 rounded-full font-bold">Mindset</span>
            </div>
        </div>

        <p class="text-center text-gray-400 text-xs mt-10 italic">Data tersimpan secara otomatis di browser Anda.</p>
    </div>

    <script>
        function updateProgress() {
            const checkboxes = document.querySelectorAll('.habit-check');
            const total = checkboxes.length;
            let checked = 0;

            checkboxes.forEach(cb => {
                if (cb.checked) checked++;
            });

            const percent = Math.round((checked / total) * 100);
            
            // Update UI
            document.getElementById('percentage').innerText = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function exportData() {
            const checkboxes = document.querySelectorAll('.habit-check');
            let result = "--- Laporan Progres Habit ---\n";
            checkboxes.forEach((cb, index) => {
                const label = cb.nextElementSibling.innerText;
                const status = cb.checked ? "[✔] Selesai" : "[ ] Belum";
                result += `${index + 1}. ${label}: ${status}\n`;
            });
            
            const blob = new Blob([result], { type: "text/plain" });
            const anchor = document.createElement("a");
            anchor.download = "habit-progres.txt";
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }
    </script>
</body>
</html>
