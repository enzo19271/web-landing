<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Modern Habit Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d0d0f;
  --card:#18181c;
  --card2:#202026;
  --border:#2d2d35;
  --text:#f2f2f2;
  --muted:#7d7d8f;
  --accent:#c8f55a;
  --accent2:#5af5c8;
  --danger:#ff5f87;

  --font-body:'DM Sans',sans-serif;
  --font-display:'DM Serif Display',serif;
  --font-mono:'DM Mono',monospace;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  padding:24px;
}

.wrapper{
  max-width:760px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:28px;
}

h1{
  font-family:var(--font-display);
  font-size:2.5rem;
}

h1 em{
  color:var(--accent);
}

.date{
  margin-top:8px;
  color:var(--muted);
  font-size:.8rem;
  font-family:var(--font-mono);
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
}

.card-label{
  font-family:var(--font-mono);
  font-size:.7rem;
  color:var(--muted);
  letter-spacing:.1em;
  margin-bottom:18px;
  text-transform:uppercase;
}

.top-progress{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:18px;
}

.big{
  font-size:4rem;
  line-height:1;
  font-family:var(--font-display);
  color:var(--accent);
}

.sub{
  color:var(--muted);
  margin-top:6px;
}

.streak{
  text-align:right;
}

.streak-num{
  font-size:2rem;
  font-family:var(--font-display);
  color:var(--accent2);
}

.bar{
  width:100%;
  height:5px;
  background:var(--card2);
  border-radius:999px;
  overflow:hidden;
  margin-bottom:22px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:.4s;
}

.habit-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.habit{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:.2s;
  cursor:pointer;
}

.habit:hover{
  transform:translateY(-2px);
  border-color:var(--accent);
}

.habit.done{
  border-color:var(--accent);
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.check{
  width:20px;
  height:20px;
  border-radius:6px;
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.8rem;
}

.habit.done .check{
  background:var(--accent);
  border-color:var(--accent);
  color:#000;
}

.habit.done .name{
  text-decoration:line-through;
  color:var(--muted);
}

.name{
  font-size:.95rem;
}

.right{
  display:flex;
  align-items:center;
  gap:10px;
}

.tag{
  font-size:.65rem;
  padding:5px 9px;
  border-radius:999px;
  font-family:var(--font-mono);
  text-transform:uppercase;
}

.health{
  background:rgba(90,245,200,.12);
  color:var(--accent2);
}

.skill{
  background:rgba(200,245,90,.12);
  color:var(--accent);
}

.mindset{
  background:rgba(255,95,135,.12);
  color:var(--danger);
}

.other{
  background:rgba(255,255,255,.08);
  color:#bbb;
}

.icon-btn{
  border:none;
  background:none;
  color:var(--muted);
  cursor:pointer;
  font-size:1rem;
}

.icon-btn:hover{
  color:var(--accent);
}

.add-box{
  margin-top:18px;
  display:flex;
  gap:10px;
}

input,select{
  background:var(--card2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:12px;
  outline:none;
}

input{
  flex:1;
}

button.add{
  background:var(--accent);
  border:none;
  color:#000;
  font-weight:700;
  border-radius:10px;
  padding:0 18px;
  cursor:pointer;
}

.sync-box{
  text-align:right;
}

.sync-status{
  font-size:.75rem;
  color:var(--muted);
  margin-top:8px;
}

.footer{
  text-align:center;
  margin-top:18px;
  color:var(--muted);
  font-size:.75rem;
}

.toast{
  position:fixed;
  right:20px;
  bottom:20px;
  background:var(--card2);
  border:1px solid var(--border);
  padding:14px 18px;
  border-radius:12px;
  transform:translateY(30px);
  opacity:0;
  transition:.25s;
}

.toast.show{
  transform:none;
  opacity:1;
}

.toast.ok{
  border-color:var(--accent);
  color:var(--accent);
}

.toast.err{
  border-color:var(--danger);
  color:var(--danger);
}

@media(max-width:600px){
  .top-progress{
    flex-direction:column;
    align-items:flex-start;
    gap:18px;
  }

  .big{
    font-size:3rem;
  }

  .add-box{
    flex-direction:column;
  }

  button.add{
    height:46px;
  }
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div>
      <h1><em>Habit</em> Tracker</h1>
      <div class="date" id="dateText"></div>
    </div>

    <div class="sync-box">
      <div id="syncState">Belum sync</div>
      <div class="sync-status" id="lastSync">-</div>
    </div>
  </div>

  <div class="card">

    <div class="card-label">
      Daily Progress
    </div>

    <div class="top-progress">

      <div>
        <div class="big" id="percentText">
          0%
        </div>

        <div class="sub" id="countText">
          0 dari 0 selesai
        </div>
      </div>

      <div class="streak">
        <div>Streak</div>

        <div class="streak-num" id="streakText">
          0
        </div>

        <div>hari</div>
      </div>

    </div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div class="habit-list" id="habitList"></div>

    <div class="add-box">

      <input
        type="text"
        id="newHabit"
        placeholder="Tambah habit baru..."
      >

      <select id="newTag">
        <option value="health">Health</option>
        <option value="skill">Skill</option>
        <option value="mindset">Mindset</option>
        <option value="other">Other</option>
      </select>

      <button class="add" onclick="addHabit()">
        Tambah
      </button>

    </div>

  </div>

  <div class="footer">
    Auto reset jam 4 pagi • Auto sync realtime • Offline safe
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
// CONFIG
// =====================================================
const RESET_HOUR = 4;

// =====================================================
// DATE SYSTEM
// =====================================================
function getLogicalDate() {
  const now = new Date();

  if (now.getHours() < RESET_HOUR) {
    now.setDate(now.getDate() - 1);
  }

  return now.toISOString().slice(0,10);
}

let TODAY = getLogicalDate();

// =====================================================
// STATE
// =====================================================
let S = JSON.parse(
  localStorage.getItem('habitState')
) || {
  habits:[
    {
      id:1,
      name:'Bangun Jam 5',
      tag:'health'
    },
    {
      id:2,
      name:'Belajar Coding',
      tag:'skill'
    },
    {
      id:3,
      name:'Olahraga',
      tag:'health'
    }
  ],
  log:{},
  streak:0,
  lastSync:null
};

// =====================================================
// INIT
// =====================================================
document.getElementById('dateText').textContent =
new Date().toLocaleDateString(
  'id-ID',
  {
    weekday:'long',
    day:'numeric',
    month:'long',
    year:'numeric'
  }
);

render();
computeStreak();
updateUI();

// =====================================================
// AUTO RESET
// =====================================================
setInterval(() => {

  const newDate = getLogicalDate();

  if (newDate !== TODAY) {

    TODAY = newDate;

    if (!S.log[TODAY]) {
      S.log[TODAY] = [];
    }

    save();

    render();

    showToast(
      'Hari baru dimulai ✨',
      'ok'
    );
  }

},60000);

// =====================================================
// SAVE
// =====================================================
function save() {

  localStorage.setItem(
    'habitState',
    JSON.stringify(S)
  );

  localStorage.setItem(
    'habitBackup',
    JSON.stringify({
      time:new Date().toISOString(),
      data:S
    })
  );
}

// =====================================================
// TODAY DONE
// =====================================================
function todayDone() {
  return S.log[TODAY] || [];
}

// =====================================================
// RENDER
// =====================================================
function render() {

  const done = todayDone();

  document.getElementById('habitList').innerHTML =
  S.habits.map(h => {

    const ok = done.includes(h.id);

    return `
    <div
      class="habit ${ok ? 'done' : ''}"
      onclick="toggleHabit(${h.id})"
    >

      <div class="left">

        <div class="check">
          ${ok ? '✓' : ''}
        </div>

        <div class="name">
          ${h.name}
        </div>

      </div>

      <div class="right">

        <div class="tag ${h.tag}">
          ${h.tag}
        </div>

        <button
          class="icon-btn"
          onclick="event.stopPropagation();editHabit(${h.id})"
        >
          ✏️
        </button>

        <button
          class="icon-btn"
          onclick="event.stopPropagation();deleteHabit(${h.id})"
        >
          🗑️
        </button>

      </div>

    </div>
    `;

  }).join('');

  updateUI();
}

// =====================================================
// UPDATE UI
// =====================================================
function updateUI() {

  const total = S.habits.length;

  const done = todayDone().length;

  const pct =
  total
  ? Math.round(done / total * 100)
  : 0;

  document.getElementById('percentText')
  .textContent = pct + '%';

  document.getElementById('countText')
  .textContent =
  `${done} dari ${total} selesai`;

  document.getElementById('fill')
  .style.width = pct + '%';

  document.getElementById('streakText')
  .textContent = S.streak;

  document.getElementById('lastSync')
  .textContent =
  S.lastSync
  ? 'Last Sync: ' + S.lastSync
  : 'Belum pernah sync';
}

// =====================================================
// TOGGLE
// =====================================================
function toggleHabit(id) {

  if (!S.log[TODAY]) {
    S.log[TODAY] = [];
  }

  const arr = S.log[TODAY];

  const index = arr.indexOf(id);

  if (index > -1) {
    arr.splice(index,1);
  } else {
    arr.push(id);
  }

  computeStreak();

  save();

  render();

  autoSync();
}

// =====================================================
// ADD
// =====================================================
function addHabit() {

  const input =
  document.getElementById('newHabit');

  const name = input.value.trim();

  if (!name) return;

  S.habits.push({
    id:Date.now(),
    name,
    tag:document.getElementById('newTag').value
  });

  input.value = '';

  save();

  render();

  autoSync();

  showToast(
    'Habit ditambahkan ✓',
    'ok'
  );
}

// =====================================================
// DELETE
// =====================================================
function deleteHabit(id) {

  if (!confirm('Hapus habit ini?')) {
    return;
  }

  S.habits =
  S.habits.filter(h => h.id !== id);

  Object.keys(S.log).forEach(date => {

    S.log[date] =
    S.log[date].filter(x => x !== id);

  });

  save();

  render();

  autoSync();

  showToast(
    'Habit dihapus',
    'ok'
  );
}

// =====================================================
// EDIT
// =====================================================
function editHabit(id) {

  const habit =
  S.habits.find(h => h.id === id);

  if (!habit) return;

  const newName =
  prompt(
    'Edit habit:',
    habit.name
  );

  if (!newName) return;

  habit.name = newName.trim();

  save();

  render();

  autoSync();

  showToast(
    'Habit diperbarui ✓',
    'ok'
  );
}

// =====================================================
// STREAK
// =====================================================
function computeStreak() {

  let n = 0;

  let d = new Date();

  while (true) {

    const k =
    d.toISOString().slice(0,10);

    const done =
    (S.log[k] || []).length;

    const total =
    S.habits.length;

    if (!total || done < total) {
      break;
    }

    n++;

    d.setDate(
      d.getDate() - 1
    );
  }

  S.streak = n;
}

// =====================================================
// AUTO SYNC
// =====================================================
async function autoSync() {

  document.getElementById('syncState')
  .textContent = 'Menyinkron...';

  await new Promise(resolve => {
    setTimeout(resolve,700);
  });

  S.lastSync =
  new Date().toLocaleTimeString(
    'id-ID'
  );

  save();

  document.getElementById('syncState')
  .textContent = 'Realtime Sync Aktif';

  updateUI();
}

// =====================================================
// OFFLINE / ONLINE
// =====================================================
window.addEventListener(
  'offline',
  () => {

    document.getElementById('syncState')
    .textContent = 'Offline';

    showToast(
      'Koneksi terputus',
      'err'
    );

  }
);

window.addEventListener(
  'online',
  () => {

    document.getElementById('syncState')
    .textContent = 'Online';

    autoSync();

    showToast(
      'Internet tersambung',
      'ok'
    );

  }
);

// =====================================================
// TOAST
// =====================================================
let toastTimer;

function showToast(msg,type='') {

  const el =
  document.getElementById('toast');

  el.textContent = msg;

  el.className =
  'toast show ' + type;

  clearTimeout(toastTimer);

  toastTimer = setTimeout(() => {

    el.className = 'toast';

  },2600);
}

// =====================================================
// ENTER ADD
// =====================================================
document
.getElementById('newHabit')
.addEventListener(
  'keydown',
  e => {

    if (e.key === 'Enter') {
      addHabit();
    }

  }
);

</script>

</body>
</html>
