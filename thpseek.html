<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitPrime — Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141417;
            --surface-hover: #1c1c21;
            --border: #26262e;
            --accent: #c8f55a;
            --accent-soft: rgba(200, 245, 90, 0.1);
            --text-main: #f8f8f2;
            --text-muted: #8e8e9a;
            --transition: all 0.25s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            padding: 20px;
        }

        .container { max-width: 650px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
        }

        .brand h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; }
        .brand span { color: var(--accent); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 20px;
            margin-bottom: 16px;
        }

        /* Habit Item */
        .habit-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 18px; border-radius: 12px;
            margin-bottom: 10px; cursor: pointer; transition: var(--transition);
        }

        .habit-item:hover { border-color: var(--accent); transform: translateY(-2px); }
        .habit-item.completed { opacity: 0.7; background: #111113; }
        .habit-item.completed .check-box { background: var(--accent); border-color: var(--accent); color: #000; }

        .check-box {
            width: 22px; height: 22px; border: 2px solid var(--border);
            border-radius: 6px; margin-right: 12px; display: flex; 
            align-items: center; justify-content: center; font-weight: bold;
        }

        .tag { font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; background: var(--surface-hover); color: var(--text-muted); }

        /* Input */
        .input-group { display: flex; gap: 8px; margin-top: 20px; }
        input, select {
            background: var(--surface); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 8px; outline: none; flex: 1;
        }
        button {
            background: var(--accent); color: #000; border: none;
            padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background: var(--accent); color: #000;
            border-radius: 50px; font-size: 0.85rem; font-weight: 600;
            display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>Habit<span>Prime</span></h1>
            <p id="date-label" style="color: var(--text-muted); font-size: 0.8rem;"></p>
        </div>
        <div style="text-align: right">
            <div id="streak-count" style="font-family: 'DM Serif Display'; font-size: 1.5rem; color: var(--accent);">0</div>
            <p style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px;">Day Streak</p>
        </div>
    </header>

    <div class="card" style="display: flex; align-items: center; justify-content: space-between;">
        <div>
            <h3 id="pct-text" style="font-size: 2rem; color: var(--accent);">0%</h3>
            <p style="color: var(--text-muted); font-size: 0.8rem;">Daily Completion</p>
        </div>
        <canvas id="ringChart" width="80" height="80"></canvas>
    </div>

    <div id="habit-list"></div>

    <div class="input-group">
        <input type="text" id="habit-input" placeholder="Tulis habit baru...">
        <select id="tag-input" style="flex: 0;">
            <option value="Health">Health</option>
            <option value="Skill">Skill</option>
            <option value="Mind">Mind</option>
        </select>
        <button onclick="app.add()">Tambah</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const app = {
        state: {
            habits: [],
            logs: {},
            today: new Date().toISOString().split('T')[0]
        },

        init() {
            this.load();
            document.getElementById('date-label').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
            this.render();
        },

        load() {
            const saved = localStorage.getItem('prime_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    this.state.habits = parsed.habits || [];
                    this.state.logs = parsed.logs || {};
                } catch (e) { console.error("Data korup, reset..."); }
            }
        },

        save() {
            localStorage.setItem('prime_data', JSON.stringify({
                habits: this.state.habits,
                logs: this.state.logs
            }));
            this.render();
        },

        add() {
            const input = document.getElementById('habit-input');
            const tag = document.getElementById('tag-input');
            if (!input.value.trim()) return;

            this.state.habits.push({
                id: Date.now().toString(),
                name: input.value,
                tag: tag.value
            });
            
            input.value = '';
            this.save();
            this.notify("Habit ditambahkan!");
        },

        toggle(id) {
            if (!this.state.logs[this.state.today]) this.state.logs[this.state.today] = [];
            const index = this.state.logs[this.state.today].indexOf(id);
            
            if (index > -1) this.state.logs[this.state.today].splice(index, 1);
            else this.state.logs[this.state.today].push(id);
            
            this.save();
        },

        render() {
            const list = document.getElementById('habit-list');
            const done = this.state.logs[this.state.today] || [];
            
            list.innerHTML = this.state.habits.map(h => `
                <div class="habit-item ${done.includes(h.id) ? 'completed' : ''}" onclick="app.toggle('${h.id}')">
                    <div style="display:flex; align-items:center;">
                        <div class="check-box">${done.includes(h.id) ? '✓' : ''}</div>
                        <div>
                            <div style="font-weight:500">${h.name}</div>
                            <span class="tag">${h.tag}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            this.updateStats();
        },

        updateStats() {
            const total = this.state.habits.length;
            const doneCount = (this.state.logs[this.state.today] || []).length;
            const pct = total ? Math.round((doneCount / total) * 100) : 0;
            
            document.getElementById('pct-text').innerText = pct + '%';
            this.drawRing(pct);
            this.calculateStreak();
        },

        drawRing(pct) {
            const canvas = document.getElementById('ringChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,80,80);
            
            // Background ring
            ctx.beginPath();
            ctx.arc(40, 40, 35, 0, 2 * Math.PI);
            ctx.strokeStyle = '#26262e';
            ctx.lineWidth = 6;
            ctx.stroke();

            // Progress ring
            ctx.beginPath();
            ctx.arc(40, 40, 35, -Math.PI/2, (-Math.PI/2) + (Math.PI*2*(pct/100)));
            ctx.strokeStyle = '#c8f55a';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.stroke();
        },

        calculateStreak() {
            let streak = 0;
            let checkDate = new Date();
            
            while (true) {
                const dateKey = checkDate.toISOString().split('T')[0];
                const done = (this.state.logs[dateKey] || []).length;
                if (done > 0 && done >= this.state.habits.length && this.state.habits.length > 0) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }
            document.getElementById('streak-count').innerText = streak;
        },

        notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }
    };

    // Run
    window.onload = () => app.init();
</script>
</body>
</html>
